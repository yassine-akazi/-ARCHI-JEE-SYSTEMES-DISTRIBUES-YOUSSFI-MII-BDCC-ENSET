<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/template}">
<head>
    <title th:text="${product.id == null} ? 'Nouveau Produit' : 'Modifier Produit'">Formulaire</title>
</head>
<body>
<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i th:class="${product.id == null} ? 'bi bi-plus-circle' : 'bi bi-pencil-square'"></i>
                        <span th:text="${product.id == null} ? 'Nouveau Produit' : 'Modifier le Produit'"></span>
                    </h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/products/save}" th:object="${product}" method="post" novalidate>
                        <!-- Champ caché pour l'id (modification) -->
                        <input type="hidden" th:field="*{id}">

                        <!-- Nom -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nom du produit</label>
                            <input type="text" th:field="*{name}"
                                   th:class="${#fields.hasErrors('name')} ? 'form-control is-invalid' : 'form-control'"
                                   placeholder="Ex: Ordinateur Dell">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>

                        <!-- Prix -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Prix (MAD)</label>
                            <input type="number" step="0.01" th:field="*{price}"
                                   th:class="${#fields.hasErrors('price')} ? 'form-control is-invalid' : 'form-control'"
                                   placeholder="Ex: 1500.00">
                            <div class="invalid-feedback" th:errors="*{price}"></div>
                        </div>

                        <!-- Quantité -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Quantité</label>
                            <input type="number" th:field="*{quantity}"
                                   th:class="${#fields.hasErrors('quantity')} ? 'form-control is-invalid' : 'form-control'"
                                   placeholder="Ex: 10">
                            <div class="invalid-feedback" th:errors="*{quantity}"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Enregistrer
                            </button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
