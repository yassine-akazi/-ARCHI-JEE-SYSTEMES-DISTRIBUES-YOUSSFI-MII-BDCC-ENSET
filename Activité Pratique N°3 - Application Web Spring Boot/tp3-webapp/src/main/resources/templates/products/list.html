<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/template}">
<head>
    <title>Liste des Produits</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-box-seam"></i> Liste des Produits</h2>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/new}" class="btn btn-success">
            <i class="bi bi-plus-lg"></i> Nouveau Produit
        </a>
    </div>

    <!-- Barre de recherche -->
    <form th:action="@{/products}" method="get" class="row g-2 mb-4">
        <div class="col-md-8">
            <input type="text" name="keyword" th:value="${keyword}"
                   class="form-control" placeholder="Rechercher un produit...">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-search"></i> Chercher
            </button>
        </div>
        <div class="col-md-2">
            <a th:href="@{/products}" class="btn btn-outline-secondary w-100">
                <i class="bi bi-x-circle"></i> Effacer
            </a>
        </div>
    </form>

    <!-- Tableau des produits -->
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Nom</th>
                    <th>Prix (MAD)</th>
                    <th>Quantité</th>
                    <th sec:authorize="hasRole('ADMIN')">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="5" class="text-center text-muted">Aucun produit trouvé.</td>
                </tr>
                <tr th:each="p : ${products}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${#numbers.formatDecimal(p.price, 1, 2)} + ' MAD'"></td>
                    <td>
                        <span th:class="${p.quantity < 5} ? 'badge bg-danger' : 'badge bg-success'"
                              th:text="${p.quantity}"></span>
                    </td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/products/edit/{id}(id=${p.id}, page=${currentPage}, keyword=${keyword})}"
                           class="btn btn-sm btn-warning me-1">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/products/delete/{id}(id=${p.id}, page=${currentPage}, keyword=${keyword})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Supprimer ce produit ?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <nav th:if="${pages.length > 1}">
        <ul class="pagination justify-content-center">
            <li th:each="i, stat : ${pages}"
                th:class="${stat.index == currentPage} ? 'page-item active' : 'page-item'">
                <a class="page-link"
                   th:href="@{/products(page=${stat.index}, keyword=${keyword})}"
                   th:text="${stat.index + 1}"></a>
            </li>
        </ul>
    </nav>

</div>
</body>
</html>
