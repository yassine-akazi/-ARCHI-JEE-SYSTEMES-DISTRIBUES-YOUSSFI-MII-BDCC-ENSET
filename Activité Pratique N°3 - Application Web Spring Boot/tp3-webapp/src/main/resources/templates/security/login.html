<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="col-md-4">
    <div class="card shadow-lg border-0">
        <div class="card-header bg-dark text-white text-center py-4">
            <h3><i class="bi bi-box-seam"></i> Gestion Produits</h3>
            <p class="mb-0 text-muted">Veuillez vous connecter</p>
        </div>
        <div class="card-body p-4">

            <!-- Message d'erreur -->
            <div th:if="${param.error}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle"></i> Identifiants incorrects.
            </div>

            <!-- Message de déconnexion -->
            <div th:if="${param.logout}" class="alert alert-success">
                <i class="bi bi-check-circle"></i> Vous avez été déconnecté.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nom d'utilisateur</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Entrez votre nom" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Mot de passe</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Entrez votre mot de passe" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-box-arrow-in-right"></i> Se connecter
                </button>
            </form>

            <hr>
            <p class="text-muted small text-center mb-0">
                Comptes de test : <strong>admin/1234</strong> (ADMIN) &nbsp;|&nbsp; <strong>user1/1234</strong> (USER)
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
